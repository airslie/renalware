name: Build Canonical Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: build-canonical-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/airslie/renalware

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(
            ruby -e '
              contents = File.read("lib/renalware.rb")
              match = contents.match(/VERSION\s*=\s*"([^"]+)"/)
              abort("Could not find Renalware::VERSION in lib/renalware.rb") unless match
              puts match[1]
            '
          )"
          SHORT_SHA="${GITHUB_SHA::12}"
          BUILD_TIMESTAMP="$(date -u +'%Y%m%dT%H%M%SZ')"
          SHA_TAG="sha-${SHORT_SHA}"
          VERSION_SHA_TAG="v${VERSION}-sha-${SHORT_SHA}"
          HUMAN_TAG="v${VERSION}-${BUILD_TIMESTAMP}-sha-${SHORT_SHA}"

          {
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "build_timestamp=${BUILD_TIMESTAMP}"
            echo "sha_tag=${SHA_TAG}"
            echo "version_sha_tag=${VERSION_SHA_TAG}"
            echo "human_tag=${HUMAN_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push canonical image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            ASSET_CACHE_BUSTER=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_sha_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.human_tag }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.title=Renalware
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_timestamp }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Write image metadata artifact
        shell: bash
        run: |
          cat > canonical-image-metadata.json <<EOF
          {
            "image_name": "${IMAGE_NAME}",
            "version": "${{ steps.meta.outputs.version }}",
            "short_sha": "${{ steps.meta.outputs.short_sha }}",
            "build_timestamp": "${{ steps.meta.outputs.build_timestamp }}",
            "sha_tag": "${{ steps.meta.outputs.sha_tag }}",
            "version_sha_tag": "${{ steps.meta.outputs.version_sha_tag }}",
            "human_tag": "${{ steps.meta.outputs.human_tag }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "source_image": "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"
          }
          EOF

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: canonical-image-metadata
          path: canonical-image-metadata.json
          if-no-files-found: error

      - name: Summarise published image
        shell: bash
        run: |
          {
            echo "## Canonical image published"
            echo
            echo "- Image: \`${IMAGE_NAME}@${{ steps.build.outputs.digest }}\`"
            echo "- Human tag: \`${{ steps.meta.outputs.human_tag }}\`"
            echo "- Version tag: \`${{ steps.meta.outputs.version_sha_tag }}\`"
            echo "- SHA tag: \`${{ steps.meta.outputs.sha_tag }}\`"
            echo "- Mutable tag: \`main\`"
          } >> "${GITHUB_STEP_SUMMARY}"
