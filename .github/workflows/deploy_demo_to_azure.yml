name: Build and Push Image to ACR (main merge)

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      ACR_NAME: acrrenalwaredemo
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      APP_SERVICE_NAME: app-renalware-demo
      APP_SERVICE_RESOURCE_GROUP: ${{ vars.AZURE_APP_SERVICE_RESOURCE_GROUP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate required repo variable
        run: |
          if [ -z "${RESOURCE_GROUP}" ]; then
            echo "Repository variable AZURE_RESOURCE_GROUP is required but not set."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image metadata
        id: meta
        run: |
          ACR_LOGIN_SERVER="$(az acr show --name "${ACR_NAME}" --resource-group "${RESOURCE_GROUP}" --query loginServer -o tsv)"
          IMAGE_NAME="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${GITHUB_SHA::12}"
          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "${GITHUB_OUTPUT}"
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Login to ACR
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image (with registry cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            ASSET_CACHE_BUSTER=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.acr_login_server }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.acr_login_server }}/${{ steps.meta.outputs.image_name }}:demo-latest
          # cache-from: type=registry,ref=${{ steps.meta.outputs.acr_login_server }}/${{ steps.meta.outputs.image_name }}:buildcache-v2
          # cache-to: type=registry,ref=${{ steps.meta.outputs.acr_login_server }}/${{ steps.meta.outputs.image_name }}:buildcache-v2,mode=max

      - name: Deploy image to App Service sidecar (deterministic)
        run: |
          APP_RG="${APP_SERVICE_RESOURCE_GROUP:-${RESOURCE_GROUP}}"
          FULL_IMAGE="${{ steps.meta.outputs.acr_login_server }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}"
          SITE_ID="$(az webapp show \
            --name "${APP_SERVICE_NAME}" \
            --resource-group "${APP_RG}" \
            --query id \
            --output tsv)"

          az resource update \
            --ids "${SITE_ID}/sitecontainers/main" \
            --api-version 2025-03-01 \
            --set properties.image="${FULL_IMAGE}"

      - name: Restart App Service
        run: |
          APP_RG="${APP_SERVICE_RESOURCE_GROUP:-${RESOURCE_GROUP}}"
          az webapp restart \
            --name "${APP_SERVICE_NAME}" \
            --resource-group "${APP_RG}"
