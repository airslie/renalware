name: Mirror main and release tags to public repo

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror-main:
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out private repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push main to public repo
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add opensource https://x-access-token:${PUBLIC_REPO_PAT}@github.com/airslie/renalware.git
          git push opensource refs/remotes/origin/main:refs/heads/main

  mirror-tag:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out private repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push matching tag to public repo
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_COMMIT="refs/tags/${TAG_NAME}^{commit}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge-base --is-ancestor "${TAG_COMMIT}" refs/remotes/origin/main; then
            echo "Tag ${TAG_NAME} does not point to a commit on origin/main" >&2
            exit 1
          fi

          git remote add opensource https://x-access-token:${PUBLIC_REPO_PAT}@github.com/airslie/renalware.git
          git push opensource "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
